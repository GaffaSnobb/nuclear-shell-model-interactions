interaction_construction:
  source: Dahl et al., Phys. Rev. C 113, 024328 (2026), Sec. II A
  sd_shell_part: USD interaction
  pf_shell_part: GXPF1B interaction
  remaining_parts: variant of the VMU interaction used in SDPF-MU
  additional_modifications: a few two-body matrix elements are modified in the same way as SDPF-MU
  model_space_usage:
    core: 16O
    shells:
      - sd
      - pf
      - sdg
    truncation: 1 hbar omega
    truncation_details:
      - permits one nucleon to cross one major shell gap at a time
      - excludes multiple cross-shell excitations and jumps across two major shell gaps
      - no further orbital-specific truncations within the 0 hbar omega and 1 hbar omega basis
    center_of_mass_note: adding sdg to sd-pf helps cover the full 1 hbar omega basis and reduce center-of-mass contamination
